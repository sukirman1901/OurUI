<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>example</title>
  <style>
:root {
  --ourui-bg: #f7f6f2;
  --ourui-fg: #1c1917;
  --ourui-primary: #1a5f4a;
  --ourui-primary-fg: #f5faf8;
  --ourui-muted: #e7e5e0;
  --ourui-muted-fg: #57534e;
  --ourui-border: #d6d3d1;
  --ourui-card: #ffffff;
  --ourui-card-fg: #1c1917;
  --ourui-accent: #0f766e;
  --ourui-accent-fg: #f0fdfa;
  --ourui-danger: #b91c1c;
  --ourui-danger-fg: #fef2f2;
  --ourui-radius: 0.5rem;
  --ourui-space-sm: 0.5rem;
  --ourui-space-md: 0.75rem;
}
.dark {
  --ourui-bg: #1c1917;
  --ourui-fg: #f5f5f4;
  --ourui-primary: #2dd4a8;
  --ourui-primary-fg: #042f2e;
  --ourui-muted: #292524;
  --ourui-muted-fg: #a8a29e;
  --ourui-border: #44403c;
  --ourui-card: #292524;
  --ourui-card-fg: #f5f5f4;
  --ourui-accent: #14b8a6;
  --ourui-accent-fg: #042f2e;
  --ourui-danger: #f87171;
  --ourui-danger-fg: #1c1917;
  --ourui-radius: 0.5rem;
  --ourui-space-sm: 0.5rem;
  --ourui-space-md: 0.75rem;
}
.ourui-root {
  font-family: system-ui, sans-serif;
  line-height: 1.5;
  background: var(--ourui-bg);
  color: var(--ourui-fg);
  min-height: 100vh;
  box-sizing: border-box;
  padding: var(--ourui-space-md);
}
.ourui-col { display: flex; flex-direction: column; gap: var(--ourui-space-md); }
.ourui-row { display: flex; flex-direction: row; gap: var(--ourui-space-md); flex-wrap: wrap; }
.ourui-grid {
  display: grid;
  gap: var(--ourui-space-md);
  grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr));
}
.ourui-shell-stack {
  display: flex;
  flex-direction: column;
  gap: var(--ourui-space-md);
  width: 100%;
}
.ourui-shell-split-3 {
  display: grid;
  gap: var(--ourui-space-md);
  grid-template-columns: minmax(11rem, 16rem) minmax(0, 1fr) minmax(11rem, 16rem);
  align-items: start;
  width: 100%;
}
@media (max-width: 767px) {
  .ourui-shell-split-3 { grid-template-columns: 1fr; }
}
.ourui-card {
  padding: var(--ourui-space-md);
  border: 1px solid var(--ourui-border);
  border-radius: var(--ourui-radius);
  background: var(--ourui-card);
  color: var(--ourui-card-fg);
}
.ourui-leaf { display: inline-block; }
a.ourui-link {
  color: var(--ourui-primary);
  text-decoration: underline;
  text-underline-offset: 0.15em;
}
a.ourui-link:hover { filter: brightness(1.1); }
a.ourui-tone-primary { color: var(--ourui-primary); }
a.ourui-tone-accent { color: var(--ourui-accent); }
a.ourui-tone-danger { color: var(--ourui-danger); }
a.ourui-tone-muted { color: var(--ourui-muted-fg); }
button.ourui-control {
  padding: var(--ourui-space-sm) var(--ourui-space-md);
  cursor: pointer;
  border-radius: var(--ourui-radius);
  border: 1px solid var(--ourui-border);
  background: var(--ourui-muted);
  color: var(--ourui-muted-fg);
}
button.ourui-tone-primary {
  background: var(--ourui-primary);
  color: var(--ourui-primary-fg);
  border-color: transparent;
}
button.ourui-tone-accent {
  background: var(--ourui-accent);
  color: var(--ourui-accent-fg);
  border-color: transparent;
}
button.ourui-tone-danger {
  background: var(--ourui-danger);
  color: var(--ourui-danger-fg);
  border-color: transparent;
}
button.ourui-tone-muted {
  background: var(--ourui-muted);
  color: var(--ourui-muted-fg);
}
  </style>
</head>
<body>
  <div class="ourui-root">
    <main class="ourui-col" data-role="page" data-ourui-id="n0001">
      <header class="ourui-col" data-role="hero" data-ourui-id="n0002">
        <span data-slot="title">Welcome</span>
        <span data-slot="subtitle">Build SaaS in Python</span>
        <button class="ourui-control ourui-tone-primary" data-role="button" data-ourui-id="n0003" data-ourui-on-click="get_started">
          <span data-slot="text">Get Started</span>
        </button>
      </header>
      <section class="ourui-col" data-role="section" data-ourui-id="n0005">
        <span data-slot="title">Features</span>
        <div class="ourui-card" data-role="card" data-ourui-id="n0006">
          <span data-slot="text">Analysis</span>
        </div>
        <div class="ourui-card" data-role="card" data-ourui-id="n0007">
          <span data-slot="text">Realtime</span>
        </div>
      </section>
      <section class="ourui-col" data-role="section" data-ourui-id="n0008">
        <span data-slot="title">Counter</span>
        <span data-role="text" data-ourui-id="n0009">
          <span data-slot="text" data-ourui-bind="count">0</span>
        </span>
        <button class="ourui-control ourui-tone-primary" data-role="button" data-ourui-id="n0010" data-ourui-on-click="increment">
          <span data-slot="text">+1</span>
        </button>
      </section>
    </main>
  </div>
  <script>
(() => {
  const handlers = {"get_started":{"kind":"server"},"increment":{"kind":"server"}};
  const rpcBase = "/__ourui/call/";
  function applyState(state) {
    if (!state) return;
    Object.keys(state).forEach((name) => {
      document.querySelectorAll('[data-ourui-bind="' + name + '"]').forEach((el) => {
        el.textContent = String(state[name]);
      });
    });
  }
  async function invoke(name, payload) {
    const meta = handlers[name] || { kind: "client" };
    const detail = { handler: name, kind: meta.kind };
    window.dispatchEvent(new CustomEvent("ourui:call", { detail }));
    if (meta.kind === "server") {
      const res = await fetch(rpcBase + encodeURIComponent(name), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload || {}),
      });
      const data = await res.json();
      window.dispatchEvent(new CustomEvent("ourui:result", { detail: data }));
      if (data && data.state) applyState(data.state);
      if (!res.ok || !data.ok) {
        console.error("[ourui] server call failed:", name, data);
        return data;
      }
      console.info("[ourui] server call ok:", name, data.result);
      return data;
    }
    console.info("[ourui] client call:", name);
    return { ok: true, handler: name, kind: "client" };
  }
  document.addEventListener("click", (ev) => {
    const el = ev.target && ev.target.closest && ev.target.closest("[data-ourui-on-click]");
    if (!el) return;
    ev.preventDefault();
    invoke(el.getAttribute("data-ourui-on-click"));
  });
  window.OurUI = { invoke, handlers, applyState };
})();
  </script>
</body>
</html>
