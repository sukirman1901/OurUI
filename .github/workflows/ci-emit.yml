name: CI emit

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  emit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e packages/ourui
      - name: Secret scan
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz gitleaks
          ./gitleaks detect --source . --no-banner --redact
      - name: Import smoke
        run: python -c "import ourui; from ourui import ui; print(ourui.__version__)"
