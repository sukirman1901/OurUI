name: Publish ourui to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Preferred: GitHub Actions secret PYPI_API_TOKEN (PyPI → Account → API tokens).
    # Fallback: Trusted Publisher on PyPI (Owner sukirman1901 · Repo OurUI · Workflow publish-pypi.yml · Environment blank).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install -U pip build
          python -m build packages/ourui
      - name: Publish to PyPI (API token)
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/ourui/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Publish to PyPI (Trusted Publisher)
        if: ${{ secrets.PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/ourui/dist
