name: Publish ourui to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Prefer secret PYPI_API_TOKEN (PyPI → Account → API tokens).
    # If unset, gh-action falls through to Trusted Publisher (OIDC) when configured.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install -U pip build
          python -m build packages/ourui
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/ourui/dist
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
